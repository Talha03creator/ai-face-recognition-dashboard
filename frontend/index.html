<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceAI — Face Detection & Recognition</title>
    <meta name="description" content="Professional local face detection and recognition dashboard powered by OpenCV AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-shell">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">👁</div>
            <span class="logo-text">FaceAI</span>
        </div>

        <nav class="nav">
            <a class="nav-item active" data-view="dashboard" href="#">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a class="nav-item" data-view="detect" href="#">
                <span class="nav-icon">🔍</span> Detect Faces
            </a>
            <a class="nav-item" data-view="match" href="#">
                <span class="nav-icon">🎯</span> Face Match
            </a>
            <a class="nav-item" data-view="users" href="#">
                <span class="nav-icon">👥</span> Users
            </a>
            <a class="nav-item" data-view="logs" href="#">
                <span class="nav-icon">📜</span> Logs
            </a>
        </nav>

        <div class="sidebar-status">
            <span class="status-dot"></span> Local Backend Active
        </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <header class="topbar">
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <div class="topbar-right">
                <div class="avatar">A</div>
            </div>
        </header>

        <div class="page-content" id="page-content">
            <p class="muted">Loading…</p>
        </div>
    </main>
</div>

<!-- ===== TEMPLATES ===== -->

<template id="tpl-dashboard">
    <div class="stats-row">
        <div class="stat-card">
            <p class="stat-label">Registered Users</p>
            <p class="stat-val" id="stat-users">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Total Detections</p>
            <p class="stat-val" id="stat-logs">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">AI Engine Status</p>
            <p class="stat-val healthy" id="stat-status">Healthy</p>
        </div>
    </div>
    <section class="card mt-6">
        <h2 class="section-title">Recent Activity</h2>
        <div id="dash-activity" class="activity-list">
            <p class="muted">No recent detections</p>
        </div>
    </section>
</template>

<template id="tpl-detect">
    <div class="two-col-layout">
        <!-- Webcam -->
        <section class="card">
            <div class="section-header">
                <h2 class="section-title">Live Webcam</h2>
                <button id="cam-btn" class="btn btn-outline" onclick="toggleCamera()">Stop Camera</button>
            </div>
            <div class="webcam-wrapper">
                <img id="webcam-feed" class="webcam-img" src="/api/detect/video_feed" alt="Webcam Feed">
            </div>
        </section>

        <!-- Upload -->
        <section class="card">
            <h2 class="section-title">Manual Upload</h2>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">📁</div>
                <p class="upload-hint">Click to upload image</p>
                <p class="upload-sub">JPG, PNG supported</p>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleUpload(this)">
            </div>

            <div id="progress-area" class="progress-wrap hidden">
                <div class="progress-bar-track">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
                <div class="progress-labels">
                    <span id="progress-status" class="muted">Starting…</span>
                    <span id="progress-pct" class="pct-text">0%</span>
                </div>
                <div id="progress-steps" class="step-list"></div>
            </div>

            <div id="upload-result"></div>
        </section>
    </div>
</template>

<template id="tpl-match">
    <div class="match-layout">
        <section class="card">
            <h2 class="section-title">🎯 Target Face Matching</h2>
            <p class="muted mb-4">Upload a target (single face) and a group photo to find a match.</p>

            <div class="match-uploads">
                <div>
                    <p class="upload-label">1. Target Person</p>
                    <div id="target-zone" class="upload-zone mini" onclick="document.getElementById('target-input').click()">
                        <div class="upload-icon">👤</div>
                        <p id="target-label">Upload face</p>
                        <input type="file" id="target-input" hidden accept="image/*">
                    </div>
                </div>
                <div>
                    <p class="upload-label">2. Group Photo</p>
                    <div id="group-zone" class="upload-zone mini" onclick="document.getElementById('group-input').click()">
                        <div class="upload-icon">👥</div>
                        <p id="group-label">Upload group</p>
                        <input type="file" id="group-input" hidden accept="image/*">
                    </div>
                </div>
            </div>

            <div class="match-action">
                <button id="match-btn" class="btn btn-primary btn-lg" disabled>Find Match</button>
            </div>
        </section>

        <section id="match-progress-section" class="card hidden">
            <h2 class="section-title">Processing…</h2>
            <div class="progress-bar-track">
                <div id="match-progress-fill" class="progress-bar-fill"></div>
            </div>
            <div class="progress-labels">
                <span id="match-status-text" class="muted">Starting…</span>
                <span id="match-pct" class="pct-text">0%</span>
            </div>
        </section>

        <section id="match-result-section" class="card hidden">
            <h2 class="section-title">Matching Result</h2>
            <div id="match-result-body"></div>
        </section>
    </div>
</template>

<template id="tpl-users">
    <div class="card">
        <div class="section-header">
            <h2 class="section-title">Registered Users</h2>
            <button class="btn btn-primary" onclick="openRegModal()">+ Register User</button>
        </div>
        <table id="users-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr><td colspan="3" class="muted">Loading…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="reg-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 class="modal-title">Register New User</h3>
            <label class="form-label">Full Name</label>
            <input type="text" id="reg-name" class="form-input" placeholder="e.g. John Doe">
            <label class="form-label mt-4">Face Photo</label>
            <input type="file" id="reg-file" accept="image/*" class="form-file">
            <div id="reg-msg" class="form-msg"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="submitReg()">Register</button>
                <button class="btn btn-outline" onclick="closeRegModal()">Cancel</button>
            </div>
        </div>
    </div>
</template>

<template id="tpl-logs">
    <div class="card">
        <h2 class="section-title">Detection Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Name</th>
                    <th>Confidence</th>
                    <th>Source</th>
                </tr>
            </thead>
            <tbody id="logs-tbody">
                <tr><td colspan="4" class="muted">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</template>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
